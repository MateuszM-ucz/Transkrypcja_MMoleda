services:
  whisper-asr:
    image: onerahmet/openai-whisper-asr-webservice:latest-gpu
    restart: on-failure:5
    ports:
      - "9000:9000"
    environment:
      - ASR_ENGINE=whisperx
      - ASR_MODEL=large-v3-turbo
      - ASR_DEVICE=cuda
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - whisper-cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  whisper-cache:
