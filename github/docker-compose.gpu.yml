services:
  whisper-asr:
    image: onerahmet/openai-whisper-asr-webservice:latest-gpu
    restart: on-failure:5
    environment:
      - ASR_ENGINE=whisperx
      - ASR_MODEL=large-v3-turbo
      - ASR_DEVICE=cuda
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - whisper-cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    image: nginx:alpine
    restart: on-failure:5
    ports:
      - "8001:8001"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - whisper-asr

volumes:
  whisper-cache:
