services:
  whisper-asr:
    image: onerahmet/openai-whisper-asr-webservice:latest
    restart: on-failure:5
    environment:
      - ASR_ENGINE=whisperx
      - ASR_MODEL=large-v3-turbo
      - ASR_DEVICE=cpu
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - whisper-cache:/root/.cache
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G

  frontend:
    image: nginx:alpine
    restart: on-failure:5
    ports:
      - "8001:8001"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - whisper-asr

volumes:
  whisper-cache:
